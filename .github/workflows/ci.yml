name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v6
      - name: Verify vendored libs checksums
        run: shasum -a 256 -c CHECKSUMS.sha256
        working-directory: libs
      # Vendored NameLayer is upstream v3.0.4 (matches deployed server). The previously
      # vendored async/RabbitMQ fork exposed symbols that crash with NoSuchMethodError
      # in prod. Fail the build if any of them sneak back into the source tree.
      - name: Guard against forbidden NameLayer symbols
        run: |
          if grep -rnE 'getGroupCache|getNameLayerReadDao|getWriteClient' \
              --include='*.kt' --include='*.java' \
              core paper velocity; then
            echo "ERROR: forbidden NameLayer symbol found above — see CHECKSUMS.sha256 note." >&2
            exit 1
          fi
      - run: ./gradlew check

      - uses: actions/upload-artifact@v7
        with:
          name: jars
          path: |
            velocity/build/libs/*.jar
            paper/build/libs/*.jar
          if-no-files-found: error
