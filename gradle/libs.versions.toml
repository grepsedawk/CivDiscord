[versions]
kotlin       = "2.0.21"
ktlint       = "12.1.1"
shadow       = "8.3.5"
serialization = "1.7.3"
exposed      = "0.55.0"
sqlite-jdbc  = "3.46.1.3"
jda          = "5.2.1"
okhttp       = "4.12.0"
slf4j        = "2.0.16"
junit        = "5.11.3"
kotest       = "6.1.11"
mockk        = "1.13.13"
mockbukkit   = "3.133.2"
velocity-api = "3.3.0-SNAPSHOT"
paper-api    = "1.21.1-R0.1-SNAPSHOT"

[libraries]
kotlinx-serialization-json = { module = "org.jetbrains.kotlinx:kotlinx-serialization-json", version.ref = "serialization" }
exposed-core   = { module = "org.jetbrains.exposed:exposed-core",   version.ref = "exposed" }
exposed-jdbc   = { module = "org.jetbrains.exposed:exposed-jdbc",   version.ref = "exposed" }
exposed-kotlin-datetime = { module = "org.jetbrains.exposed:exposed-kotlin-datetime", version.ref = "exposed" }
sqlite-jdbc    = { module = "org.xerial:sqlite-jdbc",               version.ref = "sqlite-jdbc" }
jda            = { module = "net.dv8tion:JDA",                      version.ref = "jda" }
okhttp         = { module = "com.squareup.okhttp3:okhttp",          version.ref = "okhttp" }
slf4j-api      = { module = "org.slf4j:slf4j-api",                  version.ref = "slf4j" }
junit-jupiter  = { module = "org.junit.jupiter:junit-jupiter",      version.ref = "junit" }
kotest-assertions = { module = "io.kotest:kotest-assertions-core",  version.ref = "kotest" }
mockk          = { module = "io.mockk:mockk",                       version.ref = "mockk" }
mockbukkit     = { module = "com.github.seeseemelk:MockBukkit-v1.21", version.ref = "mockbukkit" }
velocity-api   = { module = "com.velocitypowered:velocity-api",     version.ref = "velocity-api" }
paper-api      = { module = "io.papermc.paper:paper-api",           version.ref = "paper-api" }

[plugins]
kotlin-jvm        = { id = "org.jetbrains.kotlin.jvm",            version.ref = "kotlin" }
kotlin-serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
shadow            = { id = "com.gradleup.shadow",                 version.ref = "shadow" }
ktlint            = { id = "org.jlleitschuh.gradle.ktlint",       version.ref = "ktlint" }
